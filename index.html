<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Evaluación API Usuarios</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <main class="contenedor">
    <h1>Evaluación API REST con XMLHttpRequest</h1>
    <p>Endpoint utilizado: https://jsonplaceholder.typicode.com/users</p>

    <section class="botones">
      <button onclick="usuariosAPI.listarNombres()">Listar nombres de usuarios</button>
      <button onclick="usuariosAPI.buscarInfoBasica()">Buscar información básica</button>
      <button onclick="usuariosAPI.buscarDireccion()">Buscar dirección</button>
      <button onclick="usuariosAPI.buscarInfoAvanzada()">Buscar información avanzada</button>
      <button onclick="usuariosAPI.listarCompanias()">Listar compañías</button>
      <button onclick="usuariosAPI.listarNombresOrdenados()">Listar nombres ordenados</button>
      <button onclick="limpiarSalida()">Limpiar salida</button>
    </section>

    <h2>Salida en pantalla</h2>
    <pre id="salida"></pre>

    <p class="nota">
      También puedes revisar los resultados en la consola del navegador con F12.
    </p>
  </main>

  <script src="app.js"></script>
</body>
</html>
